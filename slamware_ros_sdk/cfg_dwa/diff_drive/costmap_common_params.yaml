#---(in meters)---
obstacle_range: 1.0
raytrace_range: 3.5

footprint: [[-0.47,0.20],[0.47,0.20],[0.47,-0.20],[-0.47,-0.20]]
robot_radius: 0.68
footprint_padding: 0.02 

